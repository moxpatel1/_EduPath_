<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="src/output.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex flex-col items-center justify-center min-h-screen"
      style="background-image: url('media/images/Copilot_20260201_113525.png'); background-size: cover; background-position: center;">
      
    <!-- Heading OUTSIDE the form box -->
    <h1 class="text-4xl font-bold text-white mb-6 drop-shadow-lg">
        Welcome to EduPath
    </h1>

    <div class="bg-white shadow-md w-96 rounded-lg">
        <div class="p-6">
        <h3 class="text-2xl font-bold text-center mb-6">Signup</h3>

        <div id="message" class="mb-4 p-3 rounded hidden"></div>

        <form id="signupForm">
            <input type="text" id="name" placeholder="Full Name" class="bg-white rounded-lg border p-3 w-full mb-4" required>
            <input type="email" id="email" placeholder="Email Address" class="bg-white rounded-lg border p-3 mb-4 w-full" required>
            <input type="password" id="password" placeholder="Password" class="bg-white rounded-lg border p-3 mb-4 w-full" minlength="6" required>
            <input type="password" id="passwordConfirm" placeholder="Confirm Password" class="bg-white rounded-lg border p-3 w-full mb-4" minlength="6" required>
            <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded hover:bg-blue-700 mb-4">Create Account</button>
        </form>

        <h3 class="text-gray-500 mt-4">
            Already have an account?
            <a href="login.html" class="text-blue-600 hover:underline">Log in</a>
        </h3>

        </div>
    </div>

<script>
const API_URL = "http://localhost:5000/api/auth";

document.getElementById("signupForm").addEventListener("submit", async function(event) {
    event.preventDefault();
    
    const messageDiv = document.getElementById("message");
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const passwordConfirm = document.getElementById("passwordConfirm").value;

    // Client-side validation
    if (name.length < 3) {
        showMessage("Name must be at least 3 characters long.", "error");
        return;
    }

    let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
    if (!email.match(emailPattern)) {
        showMessage("Please enter a valid email address.", "error");
        return;
    }

    if (password.length < 6) {
        showMessage("Password must be at least 6 characters long.", "error");
        return;
    }

    if (password !== passwordConfirm) {
        showMessage("Passwords do not match.", "error");
        return;
    }

    // Show loading state
    showMessage("Creating your account...", "info");

    // Send to backend
    try {
        console.log("Attempting to connect to:", API_URL + "/signup");
        
        const response = await fetch(`${API_URL}/signup`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                name,
                email,
                password,
                passwordConfirm
            })
        });

        console.log("Response received:", response.status);
        const data = await response.json();

        if (response.ok) {
            showMessage("Account created successfully! Redirecting to login...", "success");
            setTimeout(() => {
                window.location.href = "login.html";
            }, 2000);
        } else {
            showMessage(data.message || "Signup failed. Please try again.", "error");
        }
    } catch (error) {
        console.error("Fetch error:", error);
        showMessage("Error: Unable to connect to server. Make sure the backend server is running on http://localhost:5000", "error");
    }
});

function showMessage(message, type) {
    const messageDiv = document.getElementById("message");
    messageDiv.textContent = message;
    messageDiv.classList.remove("hidden");
    
    // Reset classes
    messageDiv.classList.remove("bg-green-100", "text-green-800", "bg-red-100", "text-red-800", "bg-blue-100", "text-blue-800");
    
    if (type === "success") {
        messageDiv.classList.add("bg-green-100", "text-green-800");
    } else if (type === "error") {
        messageDiv.classList.add("bg-red-100", "text-red-800");
    } else if (type === "info") {
        messageDiv.classList.add("bg-blue-100", "text-blue-800");
    }
}
</script>
</body>
</html>
