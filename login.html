<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="src/output.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="flex items-center justify-center min-h-screen"
      style="background-image: url('media/images/Copilot_20260201_113525.png'); background-size: cover; background-position: center;">
    
    <div class="bg-white p-8 rounded-lg shadow-lg w-96">
        <img src="https://copilot.microsoft.com/th/id/BCO.e145baf0-053b-4fa6-b978-f5c6b4c2dcb9.png" class="h-20 w-auto mx-auto mb-4" alt="Description of image">
        <h2 class="text-2xl font-bold text-center mb-6">
            Login
        </h2>

        <div id="message" class="mb-4 p-3 rounded hidden"></div>

        <form id="loginForm"> 
            <input type="email" id="email" placeholder="Email Address" class="w-full p-3 mb-4 border rounded" required> 
            <input type="password" id="password" placeholder="Password" minlength="6" class="w-full p-3 mb-4 border rounded" required> 
            <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded hover:bg-blue-700">Login</button>
        </form>

        <h3 class="text-gray-500 mt-4">
            Don't have an account?
            <a href="signup.html" class="text-blue-600 hover:underline">Sign up</a>
        </h3>
     </div>

<script>
const API_URL = "http://localhost:5000/api/auth";

document.getElementById("loginForm").addEventListener("submit", async function(event) {
    event.preventDefault();
    
    const messageDiv = document.getElementById("message");
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    // Client-side validation
    if (!email || !password) {
        showMessage("Please enter email and password.", "error");
        return;
    }

    // Show loading state
    showMessage("Logging in...", "info");

    try {
        console.log("Attempting to connect to:", API_URL + "/login");
        
        const response = await fetch(`${API_URL}/login`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email,
                password
            })
        });

        console.log("Response received:", response.status);
        const data = await response.json();

        if (response.ok) {
            // Store user info in localStorage
            localStorage.setItem("user", JSON.stringify(data.user));
            showMessage("Login successful! Redirecting...", "success");
            setTimeout(() => {
                window.location.href = "index.html";
            }, 2000);
        } else {
            showMessage(data.message || "Login failed. Please try again.", "error");
        }
    } catch (error) {
        console.error("Fetch error:", error);
        showMessage("Error: Unable to connect to server. Make sure the backend server is running on http://localhost:5000", "error");
    }
});

function showMessage(message, type) {
    const messageDiv = document.getElementById("message");
    messageDiv.textContent = message;
    messageDiv.classList.remove("hidden");
    
    // Reset classes
    messageDiv.classList.remove("bg-green-100", "text-green-800", "bg-red-100", "text-red-800", "bg-blue-100", "text-blue-800");
    
    if (type === "success") {
        messageDiv.classList.add("bg-green-100", "text-green-800");
    } else if (type === "error") {
        messageDiv.classList.add("bg-red-100", "text-red-800");
    } else if (type === "info") {
        messageDiv.classList.add("bg-blue-100", "text-blue-800");
    }
}
</script>
</body> 
</html>
